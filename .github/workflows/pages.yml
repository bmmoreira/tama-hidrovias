name: Deploy documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Generate TypeScript API docs (TypeDoc)
        working-directory: web
        run: npm run docs:typedoc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Sphinx dependencies
        working-directory: docs
        run: python -m pip install -r requirements.txt

      - name: Build Sphinx HTML docs into site/docs
        run: |
          mkdir -p site/docs
          python -m sphinx -b html docs/source site/docs

      - name: Copy TypeDoc output into site/typedoc
        run: |
          mkdir -p site/typedoc
          cp -R web/typedoc/* site/typedoc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
