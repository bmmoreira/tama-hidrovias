name: Deploy documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Generate TypeScript API docs (TypeDoc)
        working-directory: web
        run: npm run docs:typedoc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Sphinx dependencies
        working-directory: docs
        run: python -m pip install -r requirements.txt

      - name: Build Sphinx HTML docs into site/docs
        run: |
          mkdir -p site/docs
          python -m sphinx -b html docs/source site/docs

      - name: Copy TypeDoc output into site/typedoc
        run: |
          mkdir -p site/typedoc
          cp -R web/typedoc/* site/typedoc

      - name: Create landing index.html
        run: |
          cat > site/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Tama Hidrovias documentation</title>
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <style>
                body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 2rem; background: #0f172a; color: #e5e7eb; }
                a { color: #38bdf8; text-decoration: none; }
                a:hover { text-decoration: underline; }
                .card { max-width: 720px; margin: 0 auto; padding: 2rem 2.5rem; border-radius: 1.25rem; background: #020617; box-shadow: 0 24px 80px rgba(15,23,42,0.65); border: 1px solid rgba(148,163,184,0.45); }
                h1 { font-size: 1.75rem; margin-bottom: 0.75rem; }
                p { margin: 0.25rem 0 1rem; color: #9ca3af; }
                ul { list-style: none; padding: 0; margin: 1.5rem 0 0; }
                li + li { margin-top: 0.75rem; }
                .label { display: inline-block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #a5b4fc; margin-bottom: 0.25rem; }
              </style>
            </head>
            <body>
              <main class="card">
                <div class="label">Tama Hidrovias</div>
                <h1>Documentation entrypoint</h1>
                <p>Choose which documentation you want to open:</p>
                <ul>
                  <li>
                    <strong><a href="./docs/">Sphinx documentation</a></strong><br />
                    <span>Architecture, dashboard flows, authentication and usage guides.</span>
                  </li>
                  <li>
                    <strong><a href="./typedoc/">TypeScript API (TypeDoc)</a></strong><br />
                    <span>Typed API reference for the Next.js frontend (types, hooks and components).</span>
                  </li>
                </ul>
              </main>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
