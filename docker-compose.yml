services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tama_hidrovias
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d tama_hidrovias"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tama-network

  pgadmin:
    image: dpage/pgadmin4:9.14
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@tama-hidrovias.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_this_pgadmin_password}
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - tama-network

  strapi:
    build: ./cms
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "1337:1337"
    env_file:
      - .env
    environment:
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp/.config
      XDG_CACHE_HOME: /tmp/.cache
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: tama_hidrovias
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_password
      DATABASE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cms:/srv/app
      - /srv/app/node_modules
    networks:
      - tama-network

  web:
    build: ./web
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Internal-only Strapi URL used by server-side helpers
      STRAPI_INTERNAL_URL: http://strapi:1337
    depends_on:
      - strapi
    networks:
      - tama-network
    volumes:
      - ./assets/tiles:/forecast-tiles:ro

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8080 --workers 1
    volumes:
      - ./assets/tiff:/data/geotiffs:ro
    networks:
      - tama-network


  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - strapi
      - titiler
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Shared static assets
      - ./assets:/srv/assets:ro
      # Strapi uploads directory (served at `/uploads/` by Nginx)
      - ./cms/public/uploads:/srv/strapi-uploads:ro
    networks:
      - tama-network

  python-worker:
    build: ./pipeline
    restart: always
    command: python -m tama_hidrovias.automation.run_scheduler
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      - strapi
    networks:
      - tama-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  tama-network:
    driver: bridge
