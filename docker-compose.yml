services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tama_hidrovias
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d tama_hidrovias"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tama-network

  pgadmin:
    image: dpage/pgadmin4:9.14
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@tama-hidrovias.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_this_pgadmin_password}
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - tama-network

  strapi:
    build: ./cms
    env_file:
      - .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: tama_hidrovias
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_password
      DATABASE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cms:/srv/app
      - /srv/app/node_modules
    networks:
      - tama-network

  web:
    build: ./web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Internal-only Strapi URL used by server-side helpers
      STRAPI_INTERNAL_URL: http://strapi:1337
      # TiTiler internal endpoint reachable from inside the docker network
      TITILER_INTERNAL_URL: http://hfs-titiler:8000
      # Token to use when proxying requests to the internal TiTiler (do NOT expose as NEXT_PUBLIC_*)
      TITILER_INTERNAL_TOKEN: ${TITILER_INTERNAL_TOKEN:-}
      # Structured logger level for pino (set to debug for verbose dev logs)
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      # If you want the browser to access TiTiler directly (not recommended), set this to a public URL
      # NEXT_PUBLIC_TITILER_URL: http://localhost:8000
    depends_on:
      - strapi
    networks:
      - tama-network
    volumes:
      - ./assets/tiff:/app/assets/tiff:ro

  tileserver:
    build: ./tileserver
    ports:
      - "8080:8080"
    volumes:
      - ./data/geotiffs:/data/geotiffs:ro
    networks:
      - tama-network
  hfs-titiler:
    build: ./titiler
    container_name: hfs-titiler
    ports:
      - "8000:8000"
    volumes:
      - ./titiler/source:/app  # Mount your local repo for live editing
      - ./assets/tiff:/app/images
    restart: unless-stopped
    environment:
      # Optional: set a global access token to secure the TiTiler endpoints
      # Example: export TITILER_INTERNAL_TOKEN=my-secret && docker compose up -d
      - TITILER_API_GLOBAL_ACCESS_TOKEN=${TITILER_INTERNAL_TOKEN:-}
      - TITILER_API_TELEMETRY_ENABLED=False
    networks:
      - tama-network

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - strapi
      - tileserver
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Shared static assets
      - ./assets:/srv/assets:ro
      # Strapi uploads directory (served at `/uploads/` by Nginx)
      - ./cms/public/uploads:/srv/strapi-uploads:ro
    networks:
      - tama-network

  python-worker:
    build: ./pipeline
    command: python -m tama_hidrovias.automation.pipeline
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      - strapi
    networks:
      - tama-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  tama-network:
    driver: bridge
