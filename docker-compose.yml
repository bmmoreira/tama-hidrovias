services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tama_hidrovias
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d tama_hidrovias"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tama-network

  strapi:
    build: ./strapi
    ports:
      - "1337:1337"
    env_file:
      - .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: tama_hidrovias
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_password
      DATABASE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./strapi:/srv/app
      - /srv/app/node_modules
    networks:
      - tama-network

  nextjs:
    build: ./nextjs
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - strapi
    networks:
      - tama-network

  tileserver:
    build: ./tileserver
    ports:
      - "8080:8080"
    volumes:
      - ./data/geotiffs:/data/geotiffs:ro
    networks:
      - tama-network

  python-worker:
    build: ./python
    command: python -m tama_hidrovias.automation.pipeline
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      - strapi
    networks:
      - tama-network

volumes:
  postgres_data:

networks:
  tama-network:
    driver: bridge
