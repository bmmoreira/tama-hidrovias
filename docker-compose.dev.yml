services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tama_hidrovias
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d tama_hidrovias"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tama-network

  strapi:
    build: ./cms
    user: "${HOST_UID:?Set HOST_UID to your host uid}:${HOST_GID:?Set HOST_GID to your host gid}"
    ports:
      - "1337:1337"
    command: npm run develop
    env_file:
      - .env
    environment:
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp/.config
      XDG_CACHE_HOME: /tmp/.cache
      NODE_ENV: development
      PORT: 1337
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: tama_hidrovias
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_password
      DATABASE_SSL: "false"
      DEV_BOOTSTRAP_ANALYST_EMAIL: dev.analyst@local.test
      DEV_BOOTSTRAP_ANALYST_PASSWORD: devpass123
      DEV_BOOTSTRAP_ANALYST_USERNAME: dev-analyst
      DEV_BOOTSTRAP_ANALYST_ROLE: analyst
      DEV_BOOTSTRAP_VIEWER_EMAIL: dev.viewer@local.test
      DEV_BOOTSTRAP_VIEWER_PASSWORD: devviewer123
      DEV_BOOTSTRAP_VIEWER_USERNAME: dev-viewer
      DEV_BOOTSTRAP_VIEWER_ROLE: viewer
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cms:/srv/app
      - /srv/app/node_modules
    networks:
      - tama-network
    stdin_open: true
    tty: true

  web:
    build:
      context: ./web
      target: deps
    user: "0:0"
    command: npm run dev -- --hostname 0.0.0.0
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXTAUTH_URL: http://app.local
      NEXT_PUBLIC_STRAPI_URL: http://db.local
      STRAPI_INTERNAL_URL: http://strapi:1337
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
      - ./assets/tiff:/forecast-tiles:ro
    depends_on:
      - strapi
    networks:
      - tama-network
    stdin_open: true
    tty: true

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8080 --workers 1
    volumes:
      - ./assets/tiff:/data/geotiffs:ro
    networks:
      - tama-network

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - strapi
      - titiler
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./assets:/srv/assets:ro
      - ./cms/public/uploads:/srv/strapi-uploads:ro
    networks:
      - tama-network

volumes:
  postgres_data:

networks:
  tama-network:
    driver: bridge