worker_processes  1;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # Upstreams for internal services running on the Docker network
  upstream web_app {
    server web:3000;
  }

  upstream strapi_cms {
    server strapi:1337;
  }

  upstream tileserver_backend {
    server tileserver:8080;
  }

  # CORS: allow only the application origin to access cross-origin resources
  # such as tiles and assets. This pattern works both for development
  # (app.local) and production (app.example.com, app.staging.example.com, ...).
  map $http_origin $cors_allow_origin {
    default "";
    ~^https?://app(\.[^/:]+)?(:[0-9]+)?$ $http_origin;
  }

  # Common CORS headers for resources that need to be shared with the app.
  map $request_method $cors_allow_methods {
    default "GET, OPTIONS";
  }

  # --- Application: app.local / app.* ------------------------------------------
  server {
    listen 80;
    server_name app.local app.*;

    location / {
      proxy_pass http://web_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # --- Strapi CMS: db.local / db.* --------------------------------------------
  server {
    listen 80;
    server_name db.local db.*;

    location / {
      proxy_pass http://strapi_cms;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # --- Assets: assets.local / assets.* ----------------------------------------
  server {
    listen 80;
    server_name assets.local assets.*;

    # Serve repository-level assets (e.g. assets/logo5.png) from /srv/assets
    location / {
      alias /srv/assets/;
      access_log off;
      expires 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
      add_header Access-Control-Allow-Origin $cors_allow_origin always;
      add_header Access-Control-Allow-Methods $cors_allow_methods always;
      add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

      if ($request_method = 'OPTIONS') {
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
    }

    # Strapi public uploads can also be exposed via the assets host if
    # desired, so that images are all under the same domain.
    location /uploads/ {
      alias /srv/strapi-uploads/;
      access_log off;
      expires 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
      add_header Access-Control-Allow-Origin $cors_allow_origin always;
      add_header Access-Control-Allow-Methods $cors_allow_methods always;
      add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

      if ($request_method = 'OPTIONS') {
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
    }
  }

  # --- TileServer: tiles.local / tiles.* --------------------------------------
  server {
    listen 80;
    server_name tiles.local tiles.*;

    location / {
      proxy_pass http://tileserver_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # CORS for tile requests, limited to the app.* origin pattern
      add_header Access-Control-Allow-Origin $cors_allow_origin always;
      add_header Access-Control-Allow-Methods $cors_allow_methods always;
      add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

      if ($request_method = 'OPTIONS') {
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
    }
  }
}
